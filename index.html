<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>课程时间记录器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .course-btn {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
        }

        .course-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .course-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .course-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .timer-display {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: #667eea;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .timer-display.running {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .current-course {
            text-align: center;
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 16px;
            min-height: 24px;
        }

        .current-course span {
            color: #667eea;
            font-weight: 600;
        }

        .control-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.5);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #219a52 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .stat-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #667eea;
        }

        .date-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .date-nav button {
            background: #f0f0f0;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .date-nav button:hover {
            background: #667eea;
            color: white;
        }

        .date-display {
            font-size: 1.1rem;
            font-weight: 600;
            color: #444;
        }

        .records-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .record-item:hover {
            background: #eef0f5;
        }

        .record-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .record-course {
            font-weight: 600;
            color: #444;
        }

        .record-time {
            font-size: 0.85rem;
            color: #888;
        }

        .record-duration {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
        }

        .record-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .edit-btn:hover {
            background: #eef0ff;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 1rem;
            font-family: inherit;
        }

        .delete-btn:hover {
            color: #e74c3c;
            background: #fee;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .week-chart {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            height: 150px;
            padding: 10px 0;
        }

        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 6px 6px 0 0;
            min-height: 4px;
            transition: height 0.5s ease;
            position: relative;
        }

        .bar-label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 500;
        }

        .bar-value {
            font-size: 0.7rem;
            color: #667eea;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h3 {
            margin-bottom: 12px;
            color: #444;
        }

        .modal p {
            color: #666;
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .data-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .data-actions .btn {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .import-area {
            margin-top: 16px;
            display: none;
        }

        .import-area.show {
            display: block;
        }

        .import-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
        }

        .import-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .import-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .import-actions .btn {
            padding: 8px 20px;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .add-record-area {
            margin-top: 16px;
            display: none;
        }

        .add-record-area.show {
            display: block;
        }

        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .alert-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .alert-box {
            background: white;
            padding: 32px;
            border-radius: 20px;
            max-width: 340px;
            width: 85%;
            text-align: center;
            animation: alertPop 0.3s ease;
        }

        @keyframes alertPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .alert-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .alert-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 8px;
        }

        .alert-text {
            font-size: 1rem;
            color: #555;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .alert-time {
            font-size: 2.2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .alert-countdown {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 20px;
        }

        .alert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
        }

        .sound-test {
            margin-top: 12px;
            text-align: center;
        }

        .sound-test-btn {
            background: none;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .sound-test-btn:hover {
            background: #667eea;
            color: white;
        }

        .hint-text {
            font-size: 0.8rem;
            color: #999;
            text-align: center;
            margin-top: 8px;
        }

        .audio-status {
            text-align: center;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 8px;
            margin-top: 8px;
            display: none;
        }

        .audio-status.ready {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .audio-status.need-interaction {
            display: block;
            background: #fff3e0;
            color: #e65100;
        }

        @media (max-width: 600px) {
            .timer-display { font-size: 2.5rem; }
            .course-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.5rem; }
            .data-actions { flex-direction: column; }
            .data-actions .btn { width: 100%; justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>

<body>
    <div class="container">
        <h1>课程时间记录器</h1>

        <div class="card">
            <div class="card-title">选择课程</div>
            <div class="course-grid">
                <button class="course-btn" data-course="私教答疑">私教答疑</button>
                <button class="course-btn" data-course="私教课程">私教课程</button>
                <button class="course-btn" data-course="快速上手">快速上手</button>
                <button class="course-btn" data-course="公开课">公开课</button>
                <button class="course-btn" data-course="门店支持">门店支持</button>
            </div>

            <div class="current-course" id="currentCourse">请选择一门课程开始计时</div>
            <div class="timer-display" id="timerDisplay">00:00:00</div>

            <div class="control-btns">
                <button class="btn btn-primary" id="startBtn" disabled>开始</button>
                <button class="btn btn-danger" id="stopBtn" disabled>结束</button>
                <button class="btn btn-secondary" id="resetBtn">重置</button>
            </div>
            <div class="sound-test">
                <button class="sound-test-btn" id="testSoundBtn" onclick="testSound()">测试提示音</button>
            </div>
            <div class="hint-text">首次使用请先点击测试提示音，确保手机音量已打开</div>
            <div class="audio-status need-interaction" id="audioStatus">请点击"测试提示音"按钮激活音频</div>
        </div>

        <div class="card">
            <div class="card-title">数据管理</div>
            <div class="data-actions">
                <button class="btn btn-success" onclick="exportCSV()">导出表格</button>
                <button class="btn btn-primary" onclick="toggleImport()">导入数据</button>
                <button class="btn btn-primary" onclick="toggleAddRecord()">手动添加</button>
                <button class="btn btn-danger" onclick="clearAllData()">清空所有</button>
            </div>

            <div class="add-record-area" id="addRecordArea">
                <div class="form-group">
                    <label>课程</label>
                    <select id="manualCourse">
                        <option value="">请选择课程</option>
                        <option value="私教答疑">私教答疑</option>
                        <option value="私教课程">私教课程</option>
                        <option value="快速上手">快速上手</option>
                        <option value="公开课">公开课</option>
                        <option value="门店支持">门店支持</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="manualDate">
                    </div>
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="time" id="manualStartTime">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="time" id="manualEndTime">
                    </div>
                    <div class="form-group">
                        <label>时长（分钟，可选）</label>
                        <input type="number" id="manualDuration" placeholder="自动计算" min="1">
                    </div>
                </div>
                <div class="import-actions">
                    <button class="btn btn-secondary" onclick="toggleAddRecord()">取消</button>
                    <button class="btn btn-success" onclick="addManualRecord()">确认添加</button>
                </div>
            </div>

            <div class="import-area" id="importArea">
                <textarea class="import-textarea" id="importTextarea" placeholder="请粘贴之前导出的JSON数据..."></textarea>
                <div class="import-actions">
                    <button class="btn btn-secondary" onclick="toggleImport()">取消</button>
                    <button class="btn btn-success" onclick="importData()">确认导入</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">本周统计</div>
            <div id="weekTotalStats" style="margin-bottom: 16px;"></div>
            <div class="stats-grid" id="weekStats"></div>
            <div style="margin-top: 20px;">
                <div class="card-title" style="font-size: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <span id="chartTitle">每日时长（全部）</span>
                    <span style="font-size: 0.8rem; color: #999; font-weight: normal;">点击上方课程切换</span>
                </div>
                <div class="week-chart" id="weekChart"></div>
            </div>
        </div>

        <div class="card">
            <div class="date-nav">
                <button onclick="changeDate(-1)">&lt;</button>
                <div class="date-display" id="dateDisplay"></div>
                <button onclick="changeDate(1)">&gt;</button>
            </div>
            <div class="records-list" id="recordsList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">确认删除</h3>
            <p id="modalText">确定要删除这条记录吗？此操作不可撤销。</p>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="modalConfirmBtn" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editModalOverlay">
        <div class="modal">
            <h3>修改记录时间</h3>
            <div style="text-align:left; margin-bottom:16px;">
                <div class="form-group">
                    <label>课程：<span id="editCourseName" style="color:#667eea;font-weight:600;"></span></label>
                </div>
                <div class="form-group">
                    <label>开始时间</label>
                    <input type="datetime-local" id="editStartTime">
                </div>
                <div class="form-group">
                    <label>结束时间</label>
                    <input type="datetime-local" id="editEndTime">
                </div>
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEditRecord()">保存</button>
            </div>
        </div>
    </div>

    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box">
            <div class="alert-icon">&#128227;</div>
            <div class="alert-title" id="alertTitle">时间提醒</div>
            <div class="alert-text" id="alertText">课程已进行15分钟</div>
            <div class="alert-time" id="alertTime">00:15:00</div>
            <div class="alert-countdown" id="alertCountdown">提示音将在 10 秒后自动停止</div>
            <button class="alert-btn" onclick="closeAlert()">知道了</button>
        </div>
    </div>

    <script>
        var STORAGE_KEY = 'course_timer_records';

        var COURSE_ALERTS = {
            '私教答疑': [15, 30, 60],
            '私教课程': [30, 60, 90],
            '快速上手': [30, 60, 90],
            '公开课': [30, 60, 90],
            '门店支持': [15, 30, 60]
        };

        var ALERT_SOUND_DURATION = 10000;

        var alertedTimes = [];
        var audioCtx = null;
        var alertSoundInterval = null;
        var alertSoundTimeout = null;
        var alertCountdownInterval = null;
        var alertRemainingSeconds = 0;
        var editingRecordId = null;
        var audioUnlocked = false;
        var selectedWeekCourse = null; // 当前选中的周统计课程（null=全部）

        function getRecords() {
            var data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveRecords(records) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        function addRecord(record) {
            var records = getRecords();
            records.push(record);
            saveRecords(records);
        }

        function deleteRecord(id) {
            var records = getRecords().filter(function(r) { return r.id !== id; });
            saveRecords(records);
            renderRecords();
            renderWeekStats();
            showToast('记录已删除');
        }

        var selectedCourse = null;
        var startTime = null;
        var timerInterval = null;
        var currentDate = new Date();
        var deleteTargetId = null;
        var modalCallback = null;

        // ==================== iOS音频解锁 ====================
        function unlockAudio() {
            if (audioUnlocked) return;

            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // 播放一个无声的音频来解锁
                var buffer = audioCtx.createBuffer(1, 1, 22050);
                var source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);

                audioUnlocked = true;
                audioStatus.textContent = '音频已激活，提示音可以正常播放';
                audioStatus.className = 'audio-status ready';

                setTimeout(function() {
                    audioStatus.style.display = 'none';
                }, 3000);
            } catch(e) {
                console.log('音频解锁失败', e);
            }
        }

        // 监听所有用户交互来解锁音频
        function setupAudioUnlock() {
            var events = ['touchstart', 'touchend', 'click', 'mousedown', 'mouseup'];
            events.forEach(function(event) {
                document.addEventListener(event, unlockAudio, { once: true });
            });

            // 页面从后台切回时重新激活音频上下文，并检查遗漏的提醒
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    initAudio();
                    // 如果正在计时，检查是否有遗漏的提醒
                    // Worker 在后台保持运行，但主线程的 checkAlerts 可能被延迟
                    // 页面切回时立即补偿检查
                    if (timerInterval && startTime && selectedCourse) {
                        // 强制重新计算当前经过时间并检查所有提醒点
                        var elapsed = Date.now() - startTime;
                        var elapsedMinutes = Math.floor(elapsed / 60000);
                        var alertMinutes = COURSE_ALERTS[selectedCourse];
                        if (alertMinutes) {
                            for (var i = 0; i < alertMinutes.length; i++) {
                                var targetMin = alertMinutes[i];
                                if (elapsedMinutes >= targetMin && alertedTimes.indexOf(targetMin) === -1) {
                                    alertedTimes.push(targetMin);
                                    showAlert(targetMin);
                                }
                            }
                        }
                    }
                }
            });
        }

        function formatTime(ms) {
            var totalSeconds = Math.floor(ms / 1000);
            var hours = Math.floor(totalSeconds / 3600);
            var minutes = Math.floor((totalSeconds % 3600) / 60);
            var seconds = totalSeconds % 60;
            return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }

        function formatDuration(ms) {
            var totalSeconds = Math.floor(ms / 1000);
            var hours = Math.floor(totalSeconds / 3600);
            var minutes = Math.floor((totalSeconds % 3600) / 60);
            var seconds = totalSeconds % 60;
            var parts = [];
            if (hours > 0) parts.push(hours + '小时');
            if (minutes > 0) parts.push(minutes + '分钟');
            if (seconds > 0 || parts.length === 0) parts.push(seconds + '秒');
            return parts.join('');
        }

        function formatDurationDecimal(ms) {
            var hours = (ms / 3600000).toFixed(2);
            return hours;
        }

        function formatDateTime(timestamp) {
            var d = new Date(timestamp);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var min = String(d.getMinutes()).padStart(2, '0');
            var s = String(d.getSeconds()).padStart(2, '0');
            return y + '-' + m + '-' + day + ' ' + h + ':' + min + ':' + s;
        }

        function toDatetimeLocal(timestamp) {
            var d = new Date(timestamp);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var min = String(d.getMinutes()).padStart(2, '0');
            return y + '-' + m + '-' + day + 'T' + h + ':' + min;
        }

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API 不可用');
                }
            }
            if (audioCtx && (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted')) {
                audioCtx.resume().catch(function(e) {
                    console.log('resume 失败', e);
                });
            }
        }

        function playBeep(now, freq, duration, delay) {
            if (!audioCtx) return;
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + delay);
            gain.gain.setValueAtTime(0.25, now + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, now + delay + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + delay);
            osc.stop(now + delay + duration);
        }

        function playAlertSoundOnce() {
            initAudio();
            var played = false;

            // 尝试 Web Audio API
            if (audioCtx) {
                try {
                    var now = audioCtx.currentTime;
                    playBeep(now, 880, 0.15, 0);
                    playBeep(now, 1100, 0.15, 0.2);
                    playBeep(now, 1320, 0.2, 0.4);
                    playBeep(now, 880, 0.3, 0.65);
                    played = true;
                } catch(e) {
                    console.log('Web Audio 播放失败', e);
                }
            }

            // 备用：使用 HTML5 Audio 元素播放提示音
            if (!played) {
                try {
                    playFallbackBeep();
                } catch(e) {
                    console.log('备用音频也失败', e);
                }
            }
        }

        // 备用提示音：使用 oscillator 生成 data URI
        function playFallbackBeep() {
            // 创建简短的双声道 beep
            var sampleRate = 44100;
            var duration = 0.5;
            var numSamples = sampleRate * duration;
            var buffer = new Uint8Array(44 + numSamples * 2);

            // WAV 头部
            var view = new DataView(buffer.buffer);
            var writeString = function(offset, string) {
                for (var i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, numSamples * 2, true);

            // 生成 beep 音（880Hz + 1100Hz 双音）
            for (var i = 0; i < numSamples; i++) {
                var t = i / sampleRate;
                var sample = 0;
                if (t < 0.15) sample = Math.sin(2 * Math.PI * 880 * t);
                else if (t < 0.3) sample = Math.sin(2 * Math.PI * 1100 * (t - 0.15));
                else if (t < 0.5) sample = Math.sin(2 * Math.PI * 880 * (t - 0.3));

                // 添加淡出
                if (t > 0.4) sample *= (0.5 - t) * 10;

                sample = Math.max(-1, Math.min(1, sample));
                view.setInt16(44 + i * 2, sample * 0x7FFF, true);
            }

            var blob = new Blob([buffer], { type: 'audio/wav' });
            var url = URL.createObjectURL(blob);
            var audio = new Audio(url);
            audio.play().then(function() {
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            }).catch(function(e) {
                console.log('备用音频播放失败', e);
                URL.revokeObjectURL(url);
            });
        }

        function startAlertSound() {
            stopAlertSound();
            playAlertSoundOnce();
            alertSoundInterval = setInterval(function() {
                playAlertSoundOnce();
            }, 1500);

            alertRemainingSeconds = Math.floor(ALERT_SOUND_DURATION / 1000);
            updateAlertCountdown();

            alertCountdownInterval = setInterval(function() {
                alertRemainingSeconds--;
                updateAlertCountdown();
                if (alertRemainingSeconds <= 0) {
                    stopAlertSound();
                }
            }, 1000);

            alertSoundTimeout = setTimeout(function() {
                stopAlertSound();
            }, ALERT_SOUND_DURATION);
        }

        function updateAlertCountdown() {
            if (alertCountdown) {
                alertCountdown.textContent = '提示音将在 ' + alertRemainingSeconds + ' 秒后自动停止';
            }
        }

        function stopAlertSound() {
            if (alertSoundInterval) {
                clearInterval(alertSoundInterval);
                alertSoundInterval = null;
            }
            if (alertSoundTimeout) {
                clearTimeout(alertSoundTimeout);
                alertSoundTimeout = null;
            }
            if (alertCountdownInterval) {
                clearInterval(alertCountdownInterval);
                alertCountdownInterval = null;
            }
            if (alertCountdown) {
                alertCountdown.textContent = '提示音已停止';
            }
        }

        function toggleAddRecord() {
            addRecordArea.classList.toggle('show');

                var y = today.getFullYear();

                document.getElementById('manualDate').value = y + '-' + m + '-' + d;

        function addManualRecord() {
            var course = document.getElementById('manualCourse').value;
            var date = document.getElementById('manualDate').value;
            var startTimeStr = document.getElementById('manualStartTime').value;
            var endTimeStr = document.getElementById('manualEndTime').value;
            var durationMin = document.getElementById('manualDuration').value;

            if (!course) {
                showToast('请选择课程');
                return;
            }
            if (!date || !startTimeStr) {
                showToast('请填写日期和开始时间');
                return;
            }

            var startDate = new Date(date + 'T' + startTimeStr + ':00');
            var endDate;
            var duration;

            if (durationMin && durationMin > 0) {
                duration = parseInt(durationMin) * 60000;
                endDate = new Date(startDate.getTime() + duration);
            } else if (endTimeStr) {
                endDate = new Date(date + 'T' + endTimeStr + ':00');
                if (endDate <= startDate) {
                    endDate = new Date(endDate.getTime() + 86400000);
                }
                duration = endDate.getTime() - startDate.getTime();
            } else {
                showToast('请填写结束时间或时长');
                return;
            }

            if (duration <= 0) {
                showToast('结束时间必须晚于开始时间');
                return;
            }

            var record = {
                id: Date.now().toString(),
                course: course,
                startTime: startDate.getTime(),
                endTime: endDate.getTime(),
                duration: duration,
                date: getDateString(startDate)
            };

            var records = getRecords();
            records.push(record);
            saveRecords(records);

            toggleAddRecord();
            showToast('已添加：' + course + ' ' + formatDuration(duration));
            renderRecords();
            renderWeekStats();

            document.getElementById('manualCourse').value = '';
            document.getElementById('manualDuration').value = '';
        }

            if (!record) return;

            editingRecordId = id;
            document.getElementById('editCourseName').textContent = record.course;

        function saveEditRecord() {
            if (!editingRecordId) return;

            var startStr = document.getElementById('editStartTime').value;
            var endStr = document.getElementById('editEndTime').value;

            if (!startStr || !endStr) {
                showToast('请填写完整的时间');
                return;
            }

            var newStart = new Date(startStr).getTime();
            var newEnd = new Date(endStr).getTime();
            var newDuration = newEnd - newStart;

            if (newDuration <= 0) {
                showToast('结束时间必须晚于开始时间');
                return;
            }

            var records = getRecords();
            for (var i = 0; i < records.length; i++) {
                if (records[i].id === editingRecordId) {
                    records[i].startTime = newStart;
                    records[i].endTime = newEnd;
                    records[i].duration = newDuration;
                    records[i].date = getDateString(newStart);
                    break;
                }
            }

            saveRecords(records);
            closeEditModal();
            showToast('记录已修改');
            renderRecords();
            renderWeekStats();
        }

        // ==================== 导出CSV表格 ====================
        function exportCSV() {
            var records = getRecords();
            if (records.length === 0) {
                showToast('没有数据可导出');
                return;
            }

            var csv = '\uFEFF';
            csv += '序号,课程名称,日期,开始时间,结束时间,时长(小时),时长(时分秒)\n';

            var sorted = records.slice().sort(function(a, b) {
                return a.startTime - b.startTime;
            });

            for (var i = 0; i < sorted.length; i++) {
                var r = sorted[i];
                var startStr = formatDateTime(r.startTime);
                var endStr = formatDateTime(r.endTime);
                var hours = formatDurationDecimal(r.duration);
                var hms = formatTime(r.duration);
                csv += (i + 1) + ',' + r.course + ',' + r.date + ',' + startStr + ',' + endStr + ',' + hours + ',' + hms + '\n';
            }

            csv += '\n汇总,,,,,,\n';
            var courses = ['私教答疑', '私教课程', '快速上手', '公开课', '门店支持'];
            var totalMs = 0;
            for (var j = 0; j < courses.length; j++) {
                var c = courses[j];
                var cRecords = sorted.filter(function(r) { return r.course === c; });
                var cMs = cRecords.reduce(function(sum, r) { return sum + r.duration; }, 0);
                totalMs += cMs;
                if (cMs > 0) {
                    csv += c + '总计,,,,,' + formatDurationDecimal(cMs) + ',' + formatTime(cMs) + '\n';
                }
            }
            csv += '全部总计,,,,,' + formatDurationDecimal(totalMs) + ',' + formatTime(totalMs) + '\n';

            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            var filename = '课程时间记录_' + new Date().toISOString().split('T')[0] + '.csv';
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);

            showToast('表格已下载：' + filename);
        }

        // ==================== 日期和记录 ====================
        function formatDate(date) {
            var y = date.getFullYear();
            var m = String(date.getMonth() + 1).padStart(2, '0');
            var d = String(date.getDate()).padStart(2, '0');
            var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return y + '年' + m + '月' + d + '日 ' + weekdays[date.getDay()];
        }

        function getDateString(date) {
            var d = new Date(date);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }

        function changeDate(delta) {
            currentDate.setDate(currentDate.getDate() + delta);
            renderRecords();
        }

        function renderRecords() {
            dateDisplay.textContent = formatDate(currentDate);
            var targetDate = getDateString(currentDate);
            var records = getRecords().filter(function(r) { return r.date === targetDate; });
            recordsList.innerHTML = '';
            if (records.length === 0) {
                recordsList.innerHTML = '<div class="empty-state"><div style="font-size:3rem;margin-bottom:10px;">&#128197;</div><div>暂无记录</div></div>';
                return;
            }
            records.sort(function(a, b) { return b.startTime - a.startTime; });
            records.forEach(function(record) {
                var start = new Date(record.startTime);
                var timeStr = String(start.getHours()).padStart(2, '0') + ':' + String(start.getMinutes()).padStart(2, '0');
                var item = document.createElement('div');
                item.className = 'record-item';
                item.onclick = function(e) {
                    if (e.target.classList.contains('delete-btn') || e.target.classList.contains('edit-btn')) return;
                    openEditModal(record.id);
                };
                item.innerHTML = '<div class="record-info"><div class="record-course">' + record.course + '</div><div class="record-time">' + timeStr + ' 开始 - ' + formatTime(record.duration) + '</div></div><div class="record-actions"><button class="edit-btn" onclick="openEditModal(\'' + record.id + '\')">修改</button><button class="delete-btn" onclick="showDeleteModal(\'' + record.id + '\')">&#128465;</button></div>';
                recordsList.appendChild(item);
            });
        }

        // ==================== 本周统计 ====================
        function getWeekStart(date) {
            var d = new Date(date);
            var day = d.getDay();
            var diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        function getWeekData(courseFilter) {
            var weekStart = getWeekStart(new Date());
            var weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            weekEnd.setHours(23, 59, 59, 999);
            var records = getRecords().filter(function(r) {
                var d = new Date(r.startTime);
                var inRange = d >= weekStart && d <= weekEnd;
                if (courseFilter) {
                    return inRange && r.course === courseFilter;
                }
                return inRange;
            });
            var courses = ['私教答疑', '私教课程', '快速上手', '公开课', '门店支持'];
            var stats = {};
            courses.forEach(function(c) { stats[c] = 0; });
            records.forEach(function(r) { stats[r.course] = (stats[r.course] || 0) + r.duration; });
            var daily = {};
            for (var i = 0; i < 7; i++) {
                var d = new Date(weekStart);
                d.setDate(d.getDate() + i);
                daily[getDateString(d)] = 0;
            }
            records.forEach(function(r) {
                if (daily[r.date] !== undefined) {
                    daily[r.date] += r.duration;
                }
            });

            // 如果当前正在计时，累加当前计时的时间
            if (timerInterval && startTime && selectedCourse) {
                var now = Date.now();
                var currentDuration = now - startTime;
                var todayStr = getDateString(new Date());
                // 累加到对应课程
                stats[selectedCourse] = (stats[selectedCourse] || 0) + currentDuration;
                // 累加到对应日期
                if (daily[todayStr] !== undefined) {
                    daily[todayStr] += currentDuration;
                }
            }

            return { stats: stats, daily: daily, weekStart: weekStart };
        }

        function renderWeekStats() {
            // 获取全部数据（用于总计和课程统计）
            var allData = getWeekData();
            var stats = allData.stats;

            // 计算每周总分钟数
            var totalMinutes = 0;
            Object.entries(stats).forEach(function(entry) {
                totalMinutes += Math.floor(entry[1] / 60000);
            });

            // 渲染总计卡片（单独一行，全宽）
            var weekTotalStats = document.getElementById('weekTotalStats');
            weekTotalStats.innerHTML = '';
            var totalItem = document.createElement('div');
            totalItem.className = 'stat-item';
            totalItem.style.cssText = 'background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; width: 100%; max-width: 100%;';
            totalItem.innerHTML = '<div class="stat-label" style="color: rgba(255,255,255,0.9);">本周总计</div><div class="stat-value" style="color: white;">' + totalMinutes + '分</div>';
            totalItem.onclick = function() {
                selectedWeekCourse = null;
                renderWeekStats();
            };
            weekTotalStats.appendChild(totalItem);

            // 渲染各课程卡片（可点击）
            weekStats.innerHTML = '';
            Object.entries(stats).forEach(function(entry) {
                var course = entry[0];
                var duration = entry[1];
                var minutes = Math.floor(duration / 60000);
                var item = document.createElement('div');
                item.className = 'stat-item';
                // 选中状态样式
                if (selectedWeekCourse === course) {
                    item.style.cssText = 'background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer;';
                    item.innerHTML = '<div class="stat-label" style="color: rgba(255,255,255,0.9);">' + course + '</div><div class="stat-value" style="color: white;">' + minutes + '分</div>';
                } else {
                    item.style.cssText = 'cursor: pointer;';
                    item.innerHTML = '<div class="stat-label">' + course + '</div><div class="stat-value">' + minutes + '分</div>';
                }
                item.onclick = function() {
                    selectedWeekCourse = course;
                    renderWeekStats();
                };
                weekStats.appendChild(item);
            });

            // 根据选中课程获取对应的每日数据
            var chartData = getWeekData(selectedWeekCourse);
            var daily = chartData.daily;
            var dailyEntries = Object.entries(daily);
            // 使用本周实际最大时长作为 max，确保柱子高度能反映变化
            // 同时设置一个最小基准（1小时），避免单条记录时柱子永远是满的
            var rawMax = Math.max.apply(null, dailyEntries.map(function(e) { return e[1]; }));
            var maxDuration = Math.max(rawMax, 3600000); // 至少以1小时为基准
            var weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

            // 更新图表标题
            var chartTitle = document.getElementById('chartTitle');
            chartTitle.textContent = selectedWeekCourse ? '每日时长（' + selectedWeekCourse + '）' : '每日时长（全部）';

            weekChart.innerHTML = '';
            dailyEntries.forEach(function(entry, index) {
                var date = entry[0];
                var duration = entry[1];
                var heightPercent = (duration / maxDuration) * 100;
                var minutes = Math.floor(duration / 60000);
                var wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';
                wrapper.innerHTML = '<div class="bar-value">' + minutes + '分</div><div class="bar" style="height:' + Math.max(heightPercent, 4) + '%;"></div><div class="bar-label">' + weekdays[index] + '</div>';
                weekChart.appendChild(wrapper);
            });
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

                // ==================== Web Worker 后台计时器 ====================
        var timerWorker = null;
        var workerScriptURL = null;

        function initTimerWorker() {
            if (timerWorker) return;

            var workerScript = `
                var tickInterval = null;
                self.onmessage = function(e) {
                    if (e.data === 'start') {
                        if (tickInterval) clearInterval(tickInterval);
                        tickInterval = setInterval(function() {
                            self.postMessage('tick');
                        }, 1000);
                    } else if (e.data === 'stop') {
                        if (tickInterval) {
                            clearInterval(tickInterval);
                            tickInterval = null;
                        }
                    }
                };
            `;

            var blob = new Blob([workerScript], { type: 'application/javascript' });
            workerScriptURL = URL.createObjectURL(blob);
            timerWorker = new Worker(workerScriptURL);

            timerWorker.onmessage = function(e) {
                if (e.data === 'tick' && timerInterval && startTime && selectedCourse) {
                    // Worker 每秒发送一次 tick，用于检查提醒
                    // 即使主线程被节流，Worker 仍然能正常工作
                    checkAlerts();
                }
            };
        }

        function startTimerWorker() {
            if (!timerWorker) initTimerWorker();
            if (timerWorker) timerWorker.postMessage('start');
        }

        function stopTimerWorker() {
            if (timerWorker) timerWorker.postMessage('stop');
        }

function init() {
            setupAudioUnlock();
            renderRecords();
            renderWeekStats();
        }

        init();
    </script>
</body>
